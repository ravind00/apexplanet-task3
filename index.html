<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3: Glassmorphism Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #ff007a;
            --accent-hover: #e6006e;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(45deg, #240046, #7b2cbf, #ff007a, #3c096c);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .btn-modern {
            background: linear-gradient(135deg, var(--accent-color), #ff5e00);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 122, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .btn-modern:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 0, 122, 0.6);
        }

        #options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        #feedback {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 25px;
        }

        #joke-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--accent-color);
            margin: 20px 0;
            font-style: italic;
            font-size: 1.1rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        @media (max-width: 768px) {
            #options-container {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8rem;
            }

            .glass-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Task 3: Internship Hub</h1>
            <p>Advanced Styling & JavaScript Integration</p>
        </header>

        <section class="glass-card">
            <h2>🧠 Tech Quiz</h2>
            <div id="quiz-ui">
                <p id="question-text" style="font-size: 1.2rem; margin-bottom: 10px;">Loading...</p>
                <div id="options-container"></div>
            </div>
            <div id="feedback"></div>
            <button id="next-btn" class="btn-modern" style="display: none; width: 100%; background: linear-gradient(135deg, #00b4db, #0083b0);">Next Question</button>
        </section>

        <section class="glass-card">
            <h2>😂 Daily Dose of Code</h2>
            <p>Fetching live data from API...</p>
            
            <div id="joke-box">
                Press the button below to load a joke!
            </div>
            
            <div style="text-align: center;">
                <button onclick="fetchJoke()" class="btn-modern">Fetch Joke API</button>
            </div>
        </section>
    </div>

    <script>
        const questions = [
            {
                q: "To make a website responsive, which CSS feature is essential?",
                options: ["Flexbox only", "Media Queries", "JavaScript", "HTML Tables"],
                a: "Media Queries"
            },
            {
                q: "Which method is used to fetch data from an API in JS?",
                options: ["get()", "retrieve()", "fetch()", "axios()"],
                a: "fetch()"
            },
            {
                q: "In CSS, how do you select an element with id='demo'?",
                options: [".demo", "#demo", "demo", "*demo"],
                a: "#demo"
            }
        ];

        let currIndex = 0;
        const feedbackEl = document.getElementById("feedback");
        const nextBtn = document.getElementById("next-btn");

        function loadQuestion() {
            const qEl = document.getElementById("question-text");
            const optDiv = document.getElementById("options-container");
            
            feedbackEl.textContent = "";
            nextBtn.style.display = "none";
            optDiv.innerHTML = "";

            let current = questions[currIndex];
            qEl.textContent = `${currIndex + 1}. ${current.q}`;

            current.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.textContent = opt;
                btn.classList.add("option-btn");
                btn.style.animation = `fadeIn 0.5s ease forwards ${index * 0.1}s`;
                btn.onclick = () => handleAnswer(opt, current.a, btn);
                optDiv.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, btn) {
            const allBtns = document.querySelectorAll(".option-btn");
            allBtns.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.style.background = "rgba(46, 204, 113, 0.6)";
                btn.style.borderColor = "#2ecc71";
                feedbackEl.innerHTML = "✨ Correct Answer!";
                feedbackEl.style.color = "#2ecc71";
            } else {
                btn.style.background = "rgba(231, 76, 60, 0.6)";
                btn.style.borderColor = "#e74c3c";
                feedbackEl.innerHTML = `❌ Wrong! Correct: <b>${correct}</b>`;
                feedbackEl.style.color = "#ff6b6b";
            }
            nextBtn.style.display = "block";
        }

        nextBtn.onclick = () => {
            currIndex++;
            if (currIndex < questions.length) loadQuestion();
            else {
                document.getElementById("quiz-ui").innerHTML = "<h3 style='text-align:center'>🎉 All Done!</h3>";
                feedbackEl.textContent = "";
                nextBtn.style.display = "none";
            }
        };

        async function fetchJoke() {
            const box = document.getElementById("joke-box");
            box.innerHTML = "<i>Searching the web...</i>";
            
            try {
                const res = await fetch('https://official-joke-api.appspot.com/jokes/programming/random');
                const data = await res.json();
                const joke = data[0];
                
                box.innerHTML = `
                    <div>
                        <strong>"${joke.setup}"</strong>
                        <br><br>
                        <span style="color: #ff007a; font-weight:bold;">${joke.punchline}</span> 😆
                    </div>
                `;
            } catch (err) {
                box.textContent = "⚠️ Failed to load joke. Check internet connection.";
            }
        }

        loadQuestion();
    </script>
</body>

</html>
